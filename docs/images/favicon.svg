<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8e8ff"/>
    </linearGradient>
  </defs>
  
  <!-- Outer ring (space capsule window) -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGradient)"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Orbit lines -->
  <ellipse cx="32" cy="32" rx="28" ry="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.25" transform="rotate(-30 32 32)"/>
  <ellipse cx="32" cy="32" rx="28" ry="10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.25" transform="rotate(30 32 32)"/>
  
  <!-- Open book icon -->
  <g transform="translate(16, 20)">
    <!-- Left page -->
    <path d="M16 6 L16 24 Q8 22 0 24 L0 6 Q8 4 16 6 Z" fill="url(#bookGradient)" opacity="0.95"/>
    <!-- Right page -->
    <path d="M16 6 L16 24 Q24 22 32 24 L32 6 Q24 4 16 6 Z" fill="url(#bookGradient)" opacity="0.95"/>
    <!-- Book spine -->
    <line x1="16" y1="4" x2="16" y2="26" stroke="#667eea" stroke-width="1.5"/>
    <!-- Page lines (left) -->
    <line x1="3" y1="10" x2="13" y2="9" stroke="#764ba2" stroke-width="0.8" opacity="0.4"/>
    <line x1="3" y1="14" x2="13" y2="13" stroke="#764ba2" stroke-width="0.8" opacity="0.4"/>
    <line x1="3" y1="18" x2="13" y2="17" stroke="#764ba2" stroke-width="0.8" opacity="0.4"/>
    <!-- Page lines (right) -->
    <line x1="19" y1="9" x2="29" y2="10" stroke="#764ba2" stroke-width="0.8" opacity="0.4"/>
    <line x1="19" y1="13" x2="29" y2="14" stroke="#764ba2" stroke-width="0.8" opacity="0.4"/>
    <line x1="19" y1="17" x2="29" y2="18" stroke="#764ba2" stroke-width="0.8" opacity="0.4"/>
  </g>
  
  <!-- Small star dots -->
  <circle cx="12" cy="14" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="52" cy="16" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="10" cy="48" r="0.8" fill="#ffffff" opacity="0.4"/>
  <circle cx="54" cy="46" r="1" fill="#ffffff" opacity="0.5"/>
</svg>
