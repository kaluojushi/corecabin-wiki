<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8e8ff"/>
    </linearGradient>
  </defs>
  
  <!-- Square background with rounded corners for iOS -->
  <rect width="180" height="180" rx="40" ry="40" fill="url(#bgGradient)"/>
  
  <!-- Inner circle (space capsule window) -->
  <circle cx="90" cy="90" r="70" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
  
  <!-- Orbit lines -->
  <ellipse cx="90" cy="90" rx="75" ry="28" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2" transform="rotate(-30 90 90)"/>
  <ellipse cx="90" cy="90" rx="75" ry="28" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2" transform="rotate(30 90 90)"/>
  
  <!-- Open book icon -->
  <g transform="translate(45, 55)">
    <path d="M45 17 L45 68 Q22.5 62 0 68 L0 17 Q22.5 11 45 17 Z" fill="url(#bookGradient)" opacity="0.95"/>
    <path d="M45 17 L45 68 Q67.5 62 90 68 L90 17 Q67.5 11 45 17 Z" fill="url(#bookGradient)" opacity="0.95"/>
    <line x1="45" y1="11" x2="45" y2="74" stroke="#667eea" stroke-width="2"/>
    <line x1="8" y1="28" x2="37" y2="25" stroke="#764ba2" stroke-width="1.2" opacity="0.4"/>
    <line x1="8" y1="39" x2="37" y2="36" stroke="#764ba2" stroke-width="1.2" opacity="0.4"/>
    <line x1="8" y1="50" x2="37" y2="47" stroke="#764ba2" stroke-width="1.2" opacity="0.4"/>
    <line x1="53" y1="25" x2="82" y2="28" stroke="#764ba2" stroke-width="1.2" opacity="0.4"/>
    <line x1="53" y1="36" x2="82" y2="39" stroke="#764ba2" stroke-width="1.2" opacity="0.4"/>
    <line x1="53" y1="47" x2="82" y2="50" stroke="#764ba2" stroke-width="1.2" opacity="0.4"/>
  </g>
  
  <!-- Star dots -->
  <circle cx="32" cy="38" r="2.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="148" cy="42" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="28" cy="135" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="152" cy="130" r="2.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="90" cy="22" r="1.5" fill="#ffffff" opacity="0.3"/>
</svg>
